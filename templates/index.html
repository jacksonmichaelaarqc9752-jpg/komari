<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>小鞠知花 🌸</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,"SF Pro Text","Helvetica Neue",sans-serif;background:#7a8b9e;height:100vh;display:flex;justify-content:center;align-items:center}
.wrap{width:420px;max-width:100vw;height:100vh;max-height:860px;background:#edf1f5;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.3)}
@media(min-width:430px){.wrap{border-radius:24px;height:92vh}}
.top{background:#f8f9fa;padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #e0e0e0;flex-shrink:0}
.top .av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#f9c5d1,#fcd5ce);display:flex;align-items:center;justify-content:center;font-size:22px}
.top .n{font-size:15px;font-weight:600;color:#333}.top .st{font-size:11px;color:#999}
.top .mn{font-size:20px;color:#555;cursor:pointer;margin-left:auto}
.chat{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px;background:#dce3ea;background-image:url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='20' cy='20' r='1.5' fill='%23c8d0d8' opacity='0.4'/%3E%3C/svg%3E")}
.chat::-webkit-scrollbar{width:3px}.chat::-webkit-scrollbar-thumb{background:#bbb;border-radius:2px}
.msg{display:flex;gap:8px;max-width:84%;animation:in .25s ease}
.msg.ai{align-self:flex-start}.msg.me{align-self:flex-end;flex-direction:row-reverse}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg .a{width:30px;height:30px;border-radius:50%;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.msg.ai .a{background:linear-gradient(135deg,#f9c5d1,#f8b4c8)}
.msg.me .a{background:linear-gradient(135deg,#a0c4ff,#bdb2ff)}
.msg .b{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.msg.ai .b{background:#fff;color:#333;border-bottom-left-radius:4px}
.msg.me .b{background:#9fd3a6;color:#1a3a1f;border-bottom-right-radius:4px}
.type{display:flex;gap:8px;align-items:center;padding:4px 0}
.type .ta{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#f9c5d1,#f8b4c8);font-size:16px;display:flex;align-items:center;justify-content:center}
.type .td{display:flex;gap:4px;padding:10px 14px;background:#fff;border-radius:18px;border-bottom-left-radius:4px}
.type .td span{width:6px;height:6px;border-radius:50%;background:#bbb;animation:bounce 1.2s infinite}
.type .td span:nth-child(2){animation-delay:.2s}.type .td span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.inp{padding:8px 12px;background:#f8f9fa;border-top:1px solid #e0e0e0;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.inp input{flex:1;border:1px solid #e0e0e0;border-radius:20px;padding:10px 16px;font-size:14px;outline:none;background:#fff;font-family:inherit}
.inp input:focus{border-color:#f8b4c8}
.inp button{width:40px;height:40px;border-radius:50%;border:none;background:linear-gradient(135deg,#f9c5d1,#f8b4c8);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:transform .1s}
.inp button:hover{transform:scale(1.05)}.inp button:active{transform:scale(.95)}.inp button:disabled{opacity:.5}
.tm{text-align:center;font-size:11px;color:#aaa;padding:4px 0}
.menu{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:10;justify-content:center;align-items:flex-end}
.menu.on{display:flex}
.menu .s{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:420px}
.menu .s button{width:100%;padding:14px;border:none;background:#f5f5f5;border-radius:12px;font-size:15px;margin-bottom:8px;cursor:pointer;font-family:inherit}
.menu .s button:hover{background:#eee}.menu .s button.d{color:#e74c3c}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;z-index:20;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.on{opacity:1}
</style>
</head>
<body>
<div class="wrap">
<div class="top">
  <div class="av">🌸</div>
  <div><div class="n">小鞠知花</div><div class="st" id="sb">在线</div></div>
  <div class="mn" id="mb">⋯</div>
</div>
<div class="chat" id="ca"><div class="tm" id="tdv"></div></div>
<div class="inp">
  <input id="ib" placeholder="发消息..." autocomplete="off" maxlength="500">
  <button id="sb2">➤</button>
</div>
</div>
<div class="menu" id="mo">
<div class="s">
  <button onclick="rst()">🔄 重新开始</button>
  <button onclick="sync()">📱 同步到手机</button>
  <button onclick="mems()">🧠 小鞠记得的事</button>
  <button class="d" onclick="clm()">取消</button>
</div>
</div>
<div class="toast" id="to"></div>
<script>
const urlP=new URLSearchParams(location.search);const SID=urlP.get('sid')||'k'+Date.now();if(!urlP.get('sid')){history.replaceState({},'','?sid='+SID)}const ca=document.getElementById('ca'),ib=document.getElementById('ib'),sbb=document.getElementById('sb2'),sb=document.getElementById('sb');
let streaming=false;

function tmm(){
  const n=new Date();
  document.getElementById('tdv').textContent=n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日 '+String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
tmm();setInterval(tmm,60000);

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
function scb(){ca.scrollTop=ca.scrollHeight}

function addMsg(role,text){
  const d=document.createElement('div');
  d.className='msg '+(role==='user'?'me':'ai');
  d.innerHTML=`<div class="a">${role==='user'?'😎':'🌸'}</div><div class="b">${esc(text)}</div>`;
  ca.appendChild(d);scb();return d;
}

function styp(){
  const d=document.createElement('div');d.className='type';d.id='ty';
  d.innerHTML='<div class="ta">🌸</div><div class="td"><span></span><span></span><span></span></div>';
  ca.appendChild(d);scb();
}
function htyp(){const e=document.getElementById('ty');if(e)e.remove()}

async function send(){
  if(streaming)return;
  const m=ib.value.trim();if(!m)return;
  addMsg('user',m);ib.value='';ib.focus();styp();streaming=true;sbb.disabled=true;sb.textContent='输入中...';
  let b=null,txt='';
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:SID,message:m})});
    if(!r.ok){htyp();addMsg('ai','……（信号不太好……等一下再说）');sb.textContent='在线';streaming=false;sbb.disabled=false;return}
    const reader=r.body.getReader(),dec=new TextDecoder();let buf='';
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n');buf=lines.pop()||'';
      for(const l of lines){
        if(!l.startsWith('data: '))continue;
        const d2=l.slice(6);if(d2==='[DONE]')continue;
        try{const p=JSON.parse(d2);if(p.text){txt+=p.text;htyp();if(!b)b=addMsg('ai',txt);else b.querySelector('.b').textContent=txt;scb()}}catch(e){}
      }
    }
    if(!txt&&!b){htyp();addMsg('ai','……（低头打字）')}
  }catch(e){htyp();addMsg('ai','……网络不太好。等一下再试试。');toast('连接失败')}
  sb.textContent='在线';streaming=false;sbb.disabled=false;
}

async function rst(){
  await fetch('/api/reset',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:SID})});
  ca.innerHTML='<div class="tm" id="tdv"></div>';tmm();clm();toast('已重新开始 ✨');
  setTimeout(()=>addMsg('ai','……（低头打字）你好……我是小鞠知花。文艺部的……'),300);
}

async function sync(){clm();const url=location.origin+location.pathname+'?sid='+SID;try{await navigator.clipboard.writeText(url);toast('已复制链接！手机浏览器打开即可')}catch(e){prompt('复制这个链接到手机:',url);toast('手动复制链接即可')}}

async function mems(){
  clm();
  try{
    const r=await fetch('/api/memories?session_id='+SID);const d=await r.json();
    const ks=Object.keys(d);
    if(!ks.length) addMsg('ai','……我还不太了解你呢。多聊聊天我就记住了。');
    else{let t='我记得：\n';for(const[k,v]of Object.entries(d))t+='• '+v+'\n';addMsg('ai',t.trim())}
  }catch(e){toast('读取失败')}
}

function toast(m){const t=document.getElementById('to');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),2000)}

document.getElementById('mb').onclick=()=>document.getElementById('mo').classList.add('on');
function clm(){document.getElementById('mo').classList.remove('on')}
document.getElementById('mo').onclick=e=>{if(e.target===document.getElementById('mo'))clm()}
ib.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}})
sbb.addEventListener('click',send)

// 加载历史
setTimeout(async()=>{
  try{
    const r=await fetch('/api/history?session_id='+SID);
    const history=await r.json();
    if(history.length>0){
      // 显示分隔线
      const tm=document.createElement('div');tm.className='tm';
      tm.textContent='--- 上次聊到这里 ---';ca.appendChild(tm);
      // 显示最近20条
      const recent=history.slice(-20);
      for(const h of recent){
        addMsg(h.role==='user'?'user':'ai',h.content);
      }
      addMsg('ai','……（低头打字）你回来了。我们继续聊吧。');
    }else{
      addMsg('ai','……（低头打字）你好……我是小鞠知花。文艺部的……');
    }
    scb();
  }catch(e){
    addMsg('ai','……（低头打字）你好……我是小鞠知花。文艺部的……');
  }
},300);
</script>
</body>
</html>
